<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zai Compute Outsourcing</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <span class="brand-mark">Z</span>
          <div>
            <strong>Zai Compute</strong>
            <span>mock z.ai workflow</span>
          </div>
        </div>

        <nav class="nav">
          <button class="nav-link active" data-page="define">Define New Task</button>
          <button class="nav-link" data-page="active">Active Tasks</button>
          <button class="nav-link" data-page="activities">Activities</button>
        </nav>

        <section class="wallet-widget">
          <span>Cobo Wallet</span>
          <strong>Mock connected</strong>
          <small>Pending approvals: <b id="pendingApprovals">0</b></small>
        </section>
      </aside>

      <section class="workspace">
        <header class="topbar">
          <div>
            <h1 id="pageTitle">Define New Task</h1>
            <p id="pageSubtitle">Describe what you want miners to compute. The mock z.ai agent will draft validator criteria.</p>
          </div>
          <button id="refreshButton" class="ghost-button">Refresh</button>
        </header>

        <section id="definePage" class="page"></section>
        <section id="activePage" class="page hidden"></section>
        <section id="activitiesPage" class="page hidden"></section>
      </section>
    </main>

    <div id="modalRoot"></div>
    <script type="module" src="/src/app.js"></script>
  </body>
</html>
